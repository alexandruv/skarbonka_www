name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Single job: upload + deploy in one runner so the Pages artifact is always the Vite `dist/` output.
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Verify production bundle (not dev index.html)
        run: |
          test -f dist/index.html
          if grep -q '/src/main\\.tsx' dist/index.html; then
            echo '::error::dist/index.html still references /src/main.tsx — build did not produce a production bundle'
            cat dist/index.html
            exit 1
          fi
          grep -q '/assets/' dist/index.html || (echo '::error::No /assets/ in dist/index.html'; cat dist/index.html; exit 1)

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v5
